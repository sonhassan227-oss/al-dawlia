<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL Dawlia | Premium Pools</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:system-ui;
background:#050505;
color:#fff;
overflow-x:hidden;
}

/* ================= NAVBAR PREMIUM ================= */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 60px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-bottom:1px solid rgba(212,175,55,.15);
z-index:9999;
box-sizing:border-box;
transition:.4s;
}

/* عند السكرول */
.navbar.scrolled{
background:rgba(0,0,0,.75);
border-bottom:1px solid rgba(212,175,55,.35);
box-shadow:0 10px 40px rgba(0,0,0,.4);
}

.logoBox{
display:flex;
align-items:center;
gap:10px;
}

.logoBox img{
width:45px;
height:45px;
border-radius:10px;
}

.logoText{
color:#d4af37;
font-weight:800;
letter-spacing:1px;
}

.nav-links{
display:flex;
align-items:center;
gap:10px;
margin-left:auto;
}

.nav-links a{
padding:10px 16px;
border-radius:30px;
text-decoration:none;
color:#fff;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
transition:.3s;
font-size:14px;
}

.nav-links a:hover{
background:#d4af37;
color:#000;
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(212,175,55,.25);
}

.lang-btn{
padding:8px 16px;
border-radius:25px;
border:1px solid rgba(212,175,55,.4);
background:rgba(255,255,255,.05);
color:#fff;
cursor:pointer;
font-size:13px;
transition:.3s;
}

.lang-btn:hover{
background:#d4af37;
color:#000;
transform:scale(1.05);
box-shadow:0 10px 20px rgba(212,175,55,.3);
}

/* ================= HERO ================= */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:0 20px;
background:
linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
url('images/hero.jpg');
background-size:cover;
background-position:center;
}

.hero h1{font-size:55px;margin:0;}
.hero span{color:#d4af37;}
.hero p{opacity:.8;margin-top:10px;}

.btn{
display:inline-block;
margin-top:25px;
padding:14px 30px;
background:#d4af37;
color:#000;
border-radius:40px;
text-decoration:none;
font-weight:700;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* ================= SECTIONS ================= */
.section{
padding:100px 20px;
text-align:center;
}

.title{
color:#d4af37;
font-size:40px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#111;
padding:30px;
border-radius:15px;
border:1px solid #222;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
border-color:#d4af37;
}

/* ================= GALLERY ================= */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:18px;
}

.item{
overflow:hidden;
border-radius:16px;
background:#111;
border:1px solid #222;
}

.item img{
width:100%;
height:260px;
object-fit:cover;
transition:.5s;
}

.item:hover img{
transform:scale(1.1);
}

/* ================= FLOAT ================= */
.float{
position:fixed;
right:15px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:12px;
z-index:9999;
}

.float a{
width:50px;
height:50px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border-radius:12px;
border:1px solid #333;
transition:.3s;
}

.float a:hover{
transform:scale(1.1);
border-color:#d4af37;
}

.float img{width:25px;}

/* ================= MOBILE ================= */
@media(max-width:768px){
.hero h1{font-size:32px;}
.navbar{flex-direction:column;gap:10px;padding:15px 20px;}
.item img{height:200px;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<div class="logoBox">

</div>

<!-- HERO -->

</div>

<!-- LANGUAGE -->
<script>

const translations = {
en:{
home:"Home",about:"About",whyus:"Why Us",
heroText:"Engineering • Maintenance • Cleaning Services",
explore:"Explore Services",
services:"Services",
pool:"Pool Construction",
clean:"Cleaning Services",
water:"Water Treatment",
maintain:"Maintenance Contracts",
projects:"Our Projects"
},
ar:{
home:"الرئيسية",about:"من نحن",whyus:"لماذا نحن",
heroText:"هندسة • صيانة • خدمات تنظيف",
explore:"استكشف الخدمات",
services:"الخدمات",
pool:"إنشاء حمامات السباحة",
clean:"خدمات التنظيف",
water:"معالجة المياه",
maintain:"عقود الصيانة",
projects:"مشروعاتنا"
}
};

const btn=document.getElementById("langBtn");

function setLang(lang){

document.querySelectorAll("[data-key]").forEach(el=>{
const key=el.getAttribute("data-key");
if(translations[lang][key]){
el.textContent=translations[lang][key];
}
});

document.documentElement.lang=lang;
document.body.dir=(lang==="ar")?"rtl":"ltr";

btn.textContent=(lang==="ar")?"EN":"AR";
localStorage.setItem("lang",lang);
}

btn.onclick=()=>{
const newLang=document.documentElement.lang==="ar"?"en":"ar";
setLang(newLang);
};

window.onload=()=>{
setLang(localStorage.getItem("lang")||"en");
};

/* ================= NAVBAR SCROLL EFFECT ================= */
window.addEventListener("scroll",()=>{
const nav=document.querySelector(".navbar");
if(window.scrollY>20){
nav.classList.add("scrolled");
}else{
nav.classList.remove("scrolled");
}
});

</script>

</body>
</html>
